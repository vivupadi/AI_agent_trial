apiVersion: batch/v1
kind: CronJob
metadata:
  name: message_user
  namespace: weather
spec:
  jobTemplate:
    metadata:
      name: message_user
    spec:
      template:
        metadata: {}
        spec:
          containers:
          - image: vivupadi/weather-cronjob:latest
            name: message_user
            resources: 
              requests:
                cpu: "50m"
                memory: "128Mi"
              limits:
                cpu: "150m"
                memory: "256Mi"
            volumeMounts:
            - name: weather-db
              mountPath: /app/db
          volumes:
          - name: weather-db
            persistentVolumeClaim:
              claimName: weather-db-pvc
          restartPolicy: OnFailure
  schedule: '0 * * * *'
status: {}
